# Static Powerhouse site (index.html at repo root — no build step)
[build]
  publish = "."
  functions = "netlify/functions"
  command = ""

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

[dev]
  framework = "#static"
  publish = "."
  functions = "netlify/functions"
  port = 8742
  targetPort = 8742

# Tally Converter — Claude proxy (key stays server-side)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback (must come after /api/*)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
